<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - GCD Armil</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #000; }
        .login-card { background: #fff; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
    <div class="login-card w-full max-w-md p-10 text-center">
        <img src="img/simboloarmil.png" class="w-20 mx-auto mb-6">
        <h1 class="text-2xl font-black mb-2 uppercase tracking-tighter">Área Administrativa</h1>
        <p class="text-gray-500 mb-8 text-sm">Insira as suas credenciais para continuar</p>
        
        <form id="login-form" class="space-y-4 text-left">
            <div>
                <label class="block text-xs font-bold uppercase mb-1">Email</label>
                <input type="email" id="email" class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:border-black outline-none" required>
            </div>
            <div>
                <label class="block text-xs font-bold uppercase mb-1">Palavra-passe</label>
                <input type="password" id="password" class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:border-black outline-none" required>
            </div>
            <div id="error-msg" class="text-red-600 text-xs hidden">Credenciais incorretas!</div>
            <button type="submit" class="w-full bg-black text-white py-4 rounded-lg font-black uppercase tracking-widest hover:bg-gray-900 transition-all mt-4">Entrar</button>
            <a href="index.html" class="block text-center text-xs text-gray-500 mt-4 hover:underline">Voltar ao site</a>
        </form>
    </div>

    <script>
        firebase.initializeApp(window.firebaseConfig);
        const auth = firebase.auth();

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const error = document.getElementById('error-msg');

            try {
                await auth.signInWithEmailAndPassword(email, password);
                window.location.href = 'admin-dashboard.html';
            } catch (err) {
                console.error(err);
                error.classList.remove('hidden');
            }
        };

        // Redirect if already logged in
        auth.onAuthStateChanged(user => {
            if (user) window.location.href = 'admin-dashboard.html';
        });
    </script>
</body>
</html>
